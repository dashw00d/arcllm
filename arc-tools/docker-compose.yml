services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=db
    depends_on:
      - db

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql

  worker-fast:
    build: ./churner
    command: python worker.py fast
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - LLAMA_SERVER_URL=http://host.docker.internal:11435
      - DATABASE_URL=postgresql://temporal:temporal@db:5432/churner
      - MODEL=default
      - MAX_TOKENS=300
    depends_on:
      - temporal
      - db

  worker-heavy:
    build: ./churner
    command: python worker.py heavy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - LLAMA_SERVER_URL=http://host.docker.internal:11435
      - DATABASE_URL=postgresql://temporal:temporal@db:5432/churner
      - MODEL=default
      - MAX_TOKENS=300
    depends_on:
      - temporal
      - db

  discord-bot:
    build: ./discord-bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - LLAMA_SERVER_URL=http://host.docker.internal:11435
      - MODEL=default
    depends_on:
      - temporal

volumes:
  pgdata:
